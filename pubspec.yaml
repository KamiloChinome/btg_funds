name: btg_funds
description: "BTG Pactual Fund Management App - FPV/FIC"
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter

  hooks_riverpod: ^2.6.1
  flutter_hooks: ^0.20.5
  riverpod_annotation: ^2.6.1

  # Immutable data classes
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # Functional programming (Either type)
  dartz: ^0.10.1

  # Navigation
  go_router: ^14.8.1

  # Forms & validation
  flutter_form_builder: ^10.3.0
  form_builder_validators: ^11.1.0

  # Localization
  flutter_localizations:
    sdk: flutter
  intl: any
  easy_localization: ^3.0.7

  # Local storage
  shared_preferences: ^2.3.4

  # Loading effects
  shimmer: ^3.0.0

  # Utilities
  uuid: ^4.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # Code generation
  build_runner: ^2.4.14
  freezed: ^2.5.7
  riverpod_generator: ^2.6.3
  json_serializable: ^6.9.3
  go_router_builder: 2.8.0

flutter:
  uses-material-design: true
  assets:
    - assets/lang/
